name: Python Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  APP_NAME: ${{ vars.APP_NAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  IMAGE_TAG: ${{ vars.DOCKER_IMAGE_TAG }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USERNAME: ${{ vars.EC2_USERNAME }}
  APP_PORT: ${{ vars.APP_PORT }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  HEALTH_ENDPOINT: ${{ vars.HEALTH_ENDPOINT }}

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PyTest
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: |
          docker push $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            IMAGE=$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG

            if ! command -v docker >/dev/null 2>&1
            then
              echo "Docker not found. Installing..."

              sudo apt-get update

              sudo apt-get install -y \
                ca-certificates \
                curl \
                gnupg \
                lsb-release

              curl -fsSL https://get.docker.com | sudo sh

              sudo systemctl enable docker
              sudo systemctl start docker

              sudo usermod -aG docker $USER

              echo "Docker Installed Successfully"
            else
              echo "Docker already installed"
            fi

            docker --version

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login \
              -u "${DOCKER_USERNAME}" \
              --password-stdin

            docker rm -f ${CONTAINER_NAME}-new || true

            CURRENT_IMAGE=""

            if docker ps -a --format "{{.Names}}" | grep -q "^${CONTAINER_NAME}$"
            then
              CURRENT_IMAGE=$(docker inspect \
                ${CONTAINER_NAME} \
                --format='{{.Config.Image}}')

              echo "Current Image : $CURRENT_IMAGE"
            fi

            docker pull $IMAGE

            docker run -d \
              --name ${CONTAINER_NAME}-new \
              -p 5001:5000 \
              $IMAGE

            sleep 20

            if curl --silent --fail \
              http://localhost:5001${HEALTH_ENDPOINT}
            then
              echo "Health Check Passed"

              docker stop ${CONTAINER_NAME} || true
              docker rm ${CONTAINER_NAME} || true

              docker stop ${CONTAINER_NAME}-new
              docker commit ${CONTAINER_NAME}-new temp-image
              docker rm ${CONTAINER_NAME}-new

              docker run -d \
                --name ${CONTAINER_NAME} \
                -p 5000:5000 \
                $IMAGE

              docker image prune -f

              echo "Deployment Successful"

            else
              echo "Health Check Failed"

              docker stop ${CONTAINER_NAME}-new || true
              docker rm ${CONTAINER_NAME}-new || true

              if [ ! -z "$CURRENT_IMAGE" ]
              then
                echo "Rolling Back..."

                docker rm -f ${CONTAINER_NAME} || true

                docker run -d \
                  --name ${CONTAINER_NAME} \
                  -p 5000:5000 \
                  $CURRENT_IMAGE

                echo "Rollback Successful"
              else
                echo "No Previous Image Available"
              fi

              exit 1
            fi

            docker image prune -af || true
            docker container prune -f || true

            echo "Deployment Completed Successfully"