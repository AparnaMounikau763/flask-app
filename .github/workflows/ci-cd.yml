name: Python Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  APP_NAME: ${{ vars.APP_NAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USERNAME: ${{ vars.EC2_USERNAME }}
  APP_PORT: ${{ vars.APP_PORT }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  HEALTH_ENDPOINT: ${{ vars.HEALTH_ENDPOINT }}

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Verify Variables
        run: |
          echo "Docker Username : $DOCKER_USERNAME"
          echo "Image Name      : $IMAGE_NAME"
          echo "Image Tag       : $IMAGE_TAG"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG \
            -t $DOCKER_USERNAME/$IMAGE_NAME:latest .

      - name: Push SHA Image
        run: |
          docker push $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG

      - name: Push Latest Image
        run: |
          docker push $DOCKER_USERNAME/$IMAGE_NAME:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        env:
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HEALTH_ENDPOINT: ${{ env.HEALTH_ENDPOINT }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            IMAGE=${DOCKER_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}

            echo "======================================"
            echo "Starting Deployment"
            echo "======================================"

            if ! command -v docker >/dev/null 2>&1
            then
              echo "Docker not found. Installing..."

              sudo apt-get update

              sudo apt-get install -y \
                ca-certificates \
                curl \
                gnupg \
                lsb-release

              curl -fsSL https://get.docker.com | sudo sh

              sudo systemctl enable docker
              sudo systemctl start docker

              sudo usermod -aG docker $USER

              echo "Docker Installed Successfully"
            else
              echo "Docker already installed"
            fi

            docker --version

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
              -u "${DOCKER_USERNAME}" \
              --password-stdin

            echo "Checking existing deployment..."

            CURRENT_IMAGE=""

            if docker ps -a --format "{{.Names}}" | grep -q "^${CONTAINER_NAME}$"
            then
              CURRENT_IMAGE=$(docker inspect \
                ${CONTAINER_NAME} \
                --format='{{.Config.Image}}')

              echo "Current Image : ${CURRENT_IMAGE}"
            else
              echo "No existing deployment found"
            fi

            docker rm -f ${CONTAINER_NAME}-new || true

            echo "Pulling image..."

            docker pull ${IMAGE}

            echo "Starting temporary container..."

            docker run -d \
              --name ${CONTAINER_NAME}-new \
              -p 5001:5000 \
              ${IMAGE}

            echo "Waiting for application..."

            HEALTHY=false

            for i in {1..12}
            do
              if curl --silent --fail \
                http://localhost:5001${HEALTH_ENDPOINT}
              then
                echo ""
                echo "Health check passed"
                HEALTHY=true
                break
              fi

              echo "Retry $i..."
              sleep 5
            done

            echo "Container Status"

            docker ps -a

            echo "Container Logs"

            docker logs ${CONTAINER_NAME}-new || true

            if [ "$HEALTHY" = "true" ]
            then

              docker stop ${CONTAINER_NAME} || true
              docker rm ${CONTAINER_NAME} || true

              docker run -d \
                --name ${CONTAINER_NAME} \
                -p 5000:5000 \
                ${IMAGE}

              docker rm -f ${CONTAINER_NAME}-new || true

              echo "Deployment successful"

            else

              echo "Health check failed"

              docker logs ${CONTAINER_NAME}-new || true

              docker stop ${CONTAINER_NAME}-new || true
              docker rm ${CONTAINER_NAME}-new || true

              if [ -n "${CURRENT_IMAGE}" ]
              then
                echo "Starting Rollback"

                docker rm -f ${CONTAINER_NAME} || true

                docker pull ${CURRENT_IMAGE} || true

                docker run -d \
                  --name ${CONTAINER_NAME} \
                  -p 5000:5000 \
                  ${CURRENT_IMAGE}

                echo "Rollback Successful"

              else
                echo "No previous deployment found"
              fi

              exit 1

            fi

            echo "======================================"
            echo "Cleaning Docker Resources"
            echo "======================================"

            docker image prune -af || true
            docker container prune -f || true
            docker builder prune -af || true

            echo "======================================"
            echo "Deployment Completed Successfully"
            echo "======================================"

