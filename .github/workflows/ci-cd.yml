name: Python Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read


env:
  APP_NAME: ${{ vars.APP_NAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  IMAGE_TAG: ${{ vars.DOCKER_IMAGE_TAG }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USERNAME: ${{ vars.EC2_USERNAME }}
  APP_PORT: ${{ vars.APP_PORT }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  HEALTH_ENDPOINT: ${{ vars.HEALTH_ENDPOINT }}



jobs:

  build-test-scan-deploy:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout Repository
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}



      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV



      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Run PyTest
        run: |
          python -m pytest \
          --cov=app \
          --cov-report=xml \
          --cov-report=term



      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



      - name: Verify Variables
        run: |
          echo "Docker Username : $DOCKER_USERNAME"
          echo "Image Name      : $IMAGE_NAME"
          echo "Image Tag       : $IMAGE_TAG"



      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}



      - name: Build Docker Image
        run: |
          docker build \
          -t $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG .



      - name: Push Docker Image
        run: |
          docker push \
          $DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG





      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.2


        env:

          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HEALTH_ENDPOINT: ${{ env.HEALTH_ENDPOINT }}



        with:

          host: ${{ env.EC2_HOST }}

          username: ${{ env.EC2_USERNAME }}

          key: ${{ secrets.EC2_SSH_KEY }}


          envs: DOCKER_USERNAME,DOCKER_PASSWORD,IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,HEALTH_ENDPOINT



          script: |

            set -e



            echo "Docker Username : $DOCKER_USERNAME"
            echo "Image Name      : $IMAGE_NAME"
            echo "Image Tag       : $IMAGE_TAG"



            IMAGE=$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG



            if ! command -v docker >/dev/null 2>&1

            then

              echo "Installing Docker"



              sudo apt-get update



              sudo apt-get install -y \
              ca-certificates \
              curl \
              gnupg \
              lsb-release



              curl -fsSL https://get.docker.com | sudo sh



              sudo systemctl enable docker

              sudo systemctl start docker



              sudo usermod -aG docker $USER



            else

              echo "Docker already installed"

            fi




            docker --version




            echo "$DOCKER_PASSWORD" | \
            docker login \
            -u "$DOCKER_USERNAME" \
            --password-stdin




            docker rm -f ${CONTAINER_NAME}-new || true




            CURRENT_IMAGE=""




            if docker ps -a --format "{{.Names}}" | grep -q "^${CONTAINER_NAME}$"

            then

              CURRENT_IMAGE=$(docker inspect \
              ${CONTAINER_NAME} \
              --format='{{.Config.Image}}')



              echo "Previous Image : $CURRENT_IMAGE"

            fi





            echo "Pulling latest image"



            docker pull $IMAGE






            echo "Starting new container"




            docker run -d \
            --name ${CONTAINER_NAME}-new \
            -p 5001:5000 \
            $IMAGE





            echo "Waiting for application startup"



            sleep 20





            if curl --silent --fail \
            http://localhost:5001${HEALTH_ENDPOINT}



            then



              echo "Health check passed"


              docker stop ${CONTAINER_NAME}-new || true

              echo "Keeping failed container for debugging"




              docker rename \
              ${CONTAINER_NAME}-new \
              ${CONTAINER_NAME}




              docker image prune -f



              echo "Deployment successful"





            else



              echo "Health check failed"



              docker stop ${CONTAINER_NAME}-new || true



              docker rm ${CONTAINER_NAME}-new || true




              if [ ! -z "$CURRENT_IMAGE" ]



              then



                echo "Rollback started"




                docker rm -f ${CONTAINER_NAME} || true





                docker run -d \
                --name ${CONTAINER_NAME} \
                -p 5000:5000 \
                $CURRENT_IMAGE





                echo "Rollback completed"




              else



                echo "No previous image available"



              fi




              exit 1



            fi






            docker image prune -af || true

            docker container prune -f || true



            echo "Deployment completed successfully"